image: node:20

pipelines:
  default:
    - step:
        name: Build & Deploy to InfinityFree
        deployment: production
        script:
          - npm ci
          - npm run build
          - apt-get update && apt-get install -y lftp
          - lftp -e "
              set ftp:ssl-allow no;
              set ftp:passive-mode on;
              set net:timeout 30;
              set net:max-retries 5;
              set net:reconnect-interval-base 10;
              set cmd:verbose false;
              open -u if0_42007874,F9YdOFOBHjFj ftpupload.net;
              mirror -Rev dist/ /htdocs --parallel=4 --exclude-glob=.git --no-perms;
              bye"
