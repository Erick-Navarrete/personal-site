image: node:20

pipelines:
  default:
    - step:
        name: Build & Deploy to InfinityFree
        deployment: production
        script:
          - npm ci
          - npm run build
          - apt-get update && apt-get install -y lftp
          - lftp -c "
              set ftp:ssl-allow no;
              set ftp:passive-mode on;
              set net:timeout 30;
              set net:max-retries 5;
              set net:reconnect-interval 10;
              open -u $FTP_USER,$FTP_PASS ftpupload.net;
              mirror -Rev dist/ /htdocs --parallel=4 --exclude-glob=.git;
              bye"
